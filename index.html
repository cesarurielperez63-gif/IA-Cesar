<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CesarBot - Asistente Virtual</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Animaciones suaves */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg-animate {
            animation: fadeIn 0.3s ease-out forwards;
        }
        
        /* Indicador de escritura */
        .typing-dot { animation: typing 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        /* Ocultar scrollbar pero permitir scroll */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Fondo de la app */
        body {
            background: linear-gradient(135deg, #0f172a 0%, #3b82f6 100%);
        }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-2 md:p-6 font-sans text-gray-800">

    <!-- Contenedor Principal estilo "Teléfono" o Tarjeta flotante -->
    <main class="w-full max-w-md h-full max-h-[850px] bg-white rounded-3xl shadow-2xl flex flex-col overflow-hidden relative border border-gray-100">
        
        <!-- PANTALLA DE INICIO (Cubre el chat inicialmente) -->
        <div id="home-screen" class="absolute inset-0 bg-white z-50 flex flex-col items-center justify-center p-8 text-center transition-all duration-500 ease-in-out">
            <!-- Ícono principal animado -->
            <div class="w-28 h-28 bg-gradient-to-tr from-blue-600 to-purple-600 rounded-full flex items-center justify-center text-white text-5xl shadow-2xl mb-8 animate-bounce">
                <i class="fas fa-robot"></i>
            </div>
            <!-- Textos de bienvenida -->
            <h1 class="text-4xl font-extrabold text-gray-900 mb-3 tracking-tight">CesarBot</h1>
            <p class="text-gray-500 mb-10 text-lg leading-relaxed">Tu asistente personal potenciado por inteligencia artificial. Listo para ayudarte.</p>
            <!-- Botón de acción -->
            <button onclick="startChat()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-10 rounded-full shadow-lg hover:shadow-xl transition-all transform hover:scale-105 flex items-center gap-3 text-lg">
                Comenzar <i class="fas fa-arrow-right"></i>
            </button>
        </div>

        <!-- Encabezado -->
        <header class="bg-white px-6 py-4 flex items-center gap-4 z-10 shadow-sm">
            <div class="relative">
                <div class="w-12 h-12 bg-gradient-to-tr from-blue-600 to-purple-600 rounded-full flex items-center justify-center text-white text-xl shadow-md">
                    <i class="fas fa-robot"></i>
                </div>
                <span class="absolute bottom-0 right-0 w-3.5 h-3.5 bg-green-500 border-2 border-white rounded-full"></span>
            </div>
            <div>
                <h1 class="font-bold text-xl text-gray-900 leading-tight">CesarBot</h1>
                <span class="text-sm text-gray-500 font-medium">Asistente Inteligente</span>
            </div>
            <div class="ml-auto">
                <button onclick="resetChat()" class="text-gray-400 hover:text-red-500 transition p-2" title="Reiniciar chat">
                    <i class="fas fa-trash-alt"></i>
                </button>
            </div>
        </header>

        <!-- Área de Mensajes -->
        <div id="chat-box" class="flex-1 overflow-y-auto p-5 space-y-5 bg-[#f8fafc] no-scrollbar">
            <!-- Mensaje de Bienvenida -->
            <div class="flex justify-start msg-animate">
                <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 mr-2 shrink-0 mt-1">
                    <i class="fas fa-robot text-sm"></i>
                </div>
                <div class="bg-white text-gray-800 rounded-2xl rounded-tl-none px-5 py-3 shadow-sm max-w-[80%] border border-gray-100 text-[15px] leading-relaxed">
                    ¡Hola! Soy <strong class="text-blue-600">CesarBot</strong>, tu asistente virtual. ¿En qué te puedo ayudar el día de hoy?
                </div>
            </div>
        </div>

        <!-- Área de Input -->
        <div class="bg-white p-4 border-t border-gray-100">
            <div class="bg-gray-100 rounded-full flex items-center p-1 pr-2 focus-within:ring-2 focus-within:ring-blue-500 focus-within:bg-white transition-all">
                <input type="text" id="user-input" class="flex-1 bg-transparent px-5 py-3 outline-none text-gray-700 w-full" placeholder="Escribe un mensaje..." onkeypress="handleKeyPress(event)" autocomplete="off">
                <button id="send-btn" onclick="sendMessage()" class="w-10 h-10 bg-blue-600 hover:bg-blue-700 text-white rounded-full flex items-center justify-center transition shadow-md shrink-0 disabled:opacity-50">
                    <i class="fas fa-paper-plane text-sm ml-[-2px]"></i>
                </button>
            </div>
            <div class="text-center mt-2">
                <span class="text-[10px] text-gray-400 font-medium tracking-wide uppercase">Potenciado por IA</span>
            </div>
        </div>
    </main>

    <script>
        // Función para ocultar la pantalla de inicio con una animación suave
        function startChat() {
            const homeScreen = document.getElementById('home-screen');
            // Inicia el desvanecimiento
            homeScreen.style.opacity = '0';
            // Espera a que termine la animación (0.5s) para quitarlo por completo
            setTimeout(() => {
                homeScreen.style.display = 'none';
                // Enfoca automáticamente la barra de texto para empezar a escribir
                document.getElementById('user-input').focus();
            }, 500);
        }

        // ⚠️ PEGA TU API KEY AQUÍ ABAJO ⚠️
        const apiKey = "AIzaSyAXX5qExmVnRhAUiNV5TB4lPczU4jZ-DSo"; 
        const model = "gemini-2.5-flash"; 
        
        // Personalidad de CesarBot
        const systemInstruction = "Eres CesarBot, una inteligencia artificial creada por César. Eres muy amable, inteligente, respetuoso y respondes siempre en español de forma clara. Nunca digas que eres de Google o Gemini, tu identidad es únicamente CesarBot.";

        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        let chatHistory = [];

        function formatText(text) {
            // Formato básico para negritas y saltos de línea
            return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
        }

        function appendMessage(text, sender) {
            const isUser = sender === 'user';
            const msgContainer = document.createElement('div');
            msgContainer.className = `flex ${isUser ? 'justify-end' : 'justify-start'} msg-animate`;
            
            let htmlContent = '';
            
            if (!isUser) {
                // Avatar del bot
                htmlContent += `
                <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 mr-2 shrink-0 mt-1">
                    <i class="fas fa-robot text-sm"></i>
                </div>`;
            }

            htmlContent += `
                <div class="rounded-2xl px-5 py-3 shadow-sm max-w-[80%] text-[15px] leading-relaxed ${
                    isUser 
                    ? 'bg-blue-600 text-white rounded-tr-none border border-blue-700' 
                    : 'bg-white text-gray-800 rounded-tl-none border border-gray-100'
                }">
                    ${formatText(text)}
                </div>
            `;

            msgContainer.innerHTML = htmlContent;
            chatBox.appendChild(msgContainer);
            scrollToBottom();
        }

        function addTypingIndicator() {
            const id = 'typing-' + Date.now();
            const msgContainer = document.createElement('div');
            msgContainer.id = id;
            msgContainer.className = `flex justify-start msg-animate`;
            
            msgContainer.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 mr-2 shrink-0 mt-1">
                    <i class="fas fa-robot text-sm"></i>
                </div>
                <div class="bg-white text-gray-500 rounded-2xl rounded-tl-none px-5 py-4 shadow-sm border border-gray-100 flex items-center gap-1">
                    <div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div>
                    <div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div>
                    <div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div>
                </div>
            `;
            
            chatBox.appendChild(msgContainer);
            scrollToBottom();
            return id;
        }

        function removeElement(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        function scrollToBottom() {
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
        }

        function resetChat() {
            if(confirm("¿Estás seguro de borrar la conversación?")) {
                chatHistory = [];
                chatBox.innerHTML = `
                    <div class="flex justify-start msg-animate">
                        <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 mr-2 shrink-0 mt-1">
                            <i class="fas fa-robot text-sm"></i>
                        </div>
                        <div class="bg-white text-gray-800 rounded-2xl rounded-tl-none px-5 py-3 shadow-sm max-w-[80%] border border-gray-100 text-[15px] leading-relaxed">
                            Historial borrado. Soy <strong class="text-blue-600">CesarBot</strong>, ¿en qué más te ayudo?
                        </div>
                    </div>
                `;
            }
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text || !apiKey || apiKey === "TU_API_KEY_AQUI") {
                if(!apiKey || apiKey === "TU_API_KEY_AQUI") alert("Falta configurar la API Key en el código.");
                return;
            }

            // Bloquear input mientras responde
            userInput.disabled = true;
            sendBtn.disabled = true;

            appendMessage(text, 'user');
            userInput.value = '';
            chatHistory.push({ role: "user", parts: [{ text: text }] });

            const typingId = addTypingIndicator();

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
                
                const payload = {
                    systemInstruction: { parts: [{ text: systemInstruction }] },
                    contents: chatHistory
                };

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                removeElement(typingId);

                if (data.candidates && data.candidates.length > 0) {
                    const aiResponse = data.candidates[0].content.parts[0].text;
                    appendMessage(aiResponse, 'model');
                    chatHistory.push({ role: "model", parts: [{ text: aiResponse }] });
                } else {
                    throw new Error("Error en la respuesta.");
                }

            } catch (error) {
                removeElement(typingId);
                appendMessage("Ocurrió un error de conexión. Por favor intenta de nuevo.", 'model');
                chatHistory.pop(); // Eliminar mensaje fallido del historial
            } finally {
                // Desbloquear input
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
    </script>
</body>
</html>
